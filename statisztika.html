<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Statisztikák - Odds Labor</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== STATS PAGE ===== */
        .stats-page {
            min-height: 100vh;
            padding: 120px 0 60px;
        }

        .stats-page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .stats-page-header h1 {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ff9f, #00e4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .stats-page-header p {
            color: #7a8ea6;
            font-size: 16px;
        }

        /* Tab switcher */
        .tab-switcher {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .tab-btn {
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid rgba(0, 255, 163, 0.2);
            background: transparent;
            color: #7a8ea6;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0,255,163,0.15), rgba(0,228,255,0.1));
            border-color: rgba(0, 255, 163, 0.5);
            color: #00ff9f;
        }

        /* Summary cards */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .summary-card {
            background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(10,14,26,0.95));
            border: 1px solid rgba(0, 255, 163, 0.15);
            border-radius: 20px;
            padding: 24px 20px;
            text-align: center;
        }

        .summary-card .s-label {
            font-size: 11px;
            color: #5a6a7e;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .summary-card .s-value {
            font-size: 32px;
            font-weight: 900;
            line-height: 1;
        }

        .summary-card .s-value.positive { color: #00ff9f; }
        .summary-card .s-value.negative { color: #ff4d6d; }
        .summary-card .s-value.neutral {
            background: linear-gradient(135deg, #00ff9f, #00e4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .summary-card .s-sub {
            font-size: 15px;
            color: #5a6a7e;
            margin-top: 6px;
        }
        .summary-card .s-sub.positive { color: #00cc80; }
        .summary-card .s-sub.negative { color: #cc3d55; }

        .unit-info-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 12px;
            color: #5a6a7e;
        }
        .unit-info-bar span {
            background: rgba(0,255,163,0.07);
            border: 1px solid rgba(0,255,163,0.15);
            border-radius: 8px;
            padding: 4px 12px;
            color: #00cc80;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        /* Month accordion */
        .month-block {
            background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(10,14,26,0.95));
            border: 1px solid rgba(0, 255, 163, 0.1);
            border-radius: 20px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .month-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 28px;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .month-header:hover {
            background: rgba(0, 255, 163, 0.04);
        }

        .month-title {
            font-size: 18px;
            font-weight: 700;
            color: #c0c8d4;
        }

        .month-meta {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .month-stat {
            font-size: 13px;
            color: #5a6a7e;
        }

        .month-stat span {
            font-weight: 700;
            color: #a0b5cc;
        }

        .month-profit {
            font-size: 16px;
            font-weight: 800;
            min-width: 100px;
            text-align: right;
        }

        .month-profit.pos { color: #00ff9f; }
        .month-profit.neg { color: #ff4d6d; }

        .month-toggle {
            color: #5a6a7e;
            font-size: 20px;
            transition: transform 0.3s;
            margin-left: 16px;
        }

        .month-block.open .month-toggle {
            transform: rotate(45deg);
        }

        /* Bets table */
        .bets-table-wrap {
            display: none;
            padding: 0 28px 20px;
        }

        .month-block.open .bets-table-wrap {
            display: block;
        }

        .bets-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .bets-table thead th {
            padding: 10px 12px;
            text-align: left;
            color: #5a6a7e;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .bets-table tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
        }

        .bets-table tbody tr:hover {
            background: rgba(0, 255, 163, 0.03);
        }

        .bets-table tbody tr:last-child {
            border-bottom: none;
        }

        .bets-table td {
            padding: 12px 12px;
            color: #c0c8d4;
            vertical-align: middle;
        }

        .bet-date {
            color: #5a6a7e;
            white-space: nowrap;
            font-size: 12px;
        }

        .bet-match {
            font-weight: 600;
        }

        .bet-pick {
            color: #7a8ea6;
            font-size: 12px;
        }

        .bet-odds {
            color: #a0b5cc;
            font-weight: 600;
        }

        .bet-stake {
            color: #7a8ea6;
            white-space: nowrap;
        }

        .bet-unit {
            font-weight: 800;
            text-align: right;
            white-space: nowrap;
        }

        .bet-unit.win { color: #00ff9f; }
        .bet-unit.loss { color: #ff4d6d; }
        .bet-unit.push { color: #7a8ea6; }

        .result-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .result-badge.win {
            background: rgba(0, 255, 163, 0.12);
            color: #00ff9f;
        }

        .result-badge.loss {
            background: rgba(255, 77, 109, 0.12);
            color: #ff4d6d;
        }

        .result-badge.push {
            background: rgba(160, 181, 204, 0.12);
            color: #a0b5cc;
        }

        .no-data {
            text-align: center;
            color: #5a6a7e;
            padding: 40px;
            font-size: 14px;
        }

        /* Filter toggle bar */
        .filter-toggle-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .filter-toggle-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 50px;
            border: 1px solid rgba(0,255,163,0.25);
            background: transparent;
            color: #a0b5cc;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .filter-toggle-btn:hover, .filter-toggle-btn.open {
            background: rgba(0,255,163,0.08);
            border-color: rgba(0,255,163,0.5);
            color: #00ff9f;
        }

        .filter-active-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ff9f;
            color: #0a0e1a;
            font-size: 10px;
            font-weight: 900;
        }

        /* Filter panel */
        .filter-panel {
            display: none;
            background: linear-gradient(135deg, rgba(15,23,42,0.98), rgba(10,14,26,0.98));
            border: 1px solid rgba(0,255,163,0.12);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 24px;
        }

        .filter-panel.open { display: block; }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }

        .filter-row:last-child { margin-bottom: 0; }

        .filter-label {
            font-size: 11px;
            color: #5a6a7e;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 80px;
        }

        .filter-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex: 1;
        }

        .filter-btn {
            padding: 5px 13px;
            border-radius: 30px;
            border: 1px solid rgba(0,255,163,0.15);
            background: transparent;
            color: #7a8ea6;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn:hover {
            border-color: rgba(0,255,163,0.3);
            color: #a0b5cc;
        }

        .filter-btn.active {
            background: rgba(0,255,163,0.12);
            border-color: rgba(0,255,163,0.5);
            color: #00ff9f;
        }

        .filter-reset {
            padding: 5px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255,77,109,0.2);
            background: transparent;
            color: #ff4d6d;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .filter-reset:hover { background: rgba(255,77,109,0.08); }

        /* Chart */
        /* Breakdown */
        .breakdown-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        .breakdown-card {
            background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(10,14,26,0.95));
            border: 1px solid rgba(0,255,163,0.1);
            border-radius: 20px;
            padding: 24px;
        }

        .breakdown-title {
            font-size: 13px;
            color: #5a6a7e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .breakdown-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .breakdown-table th {
            padding: 6px 8px;
            text-align: left;
            color: #5a6a7e;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .breakdown-table th:not(:first-child) { text-align: right; }

        .breakdown-table td {
            padding: 8px 8px;
            color: #c0c8d4;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .breakdown-table td:not(:first-child) { text-align: right; }
        .breakdown-table tr:last-child td { border-bottom: none; }

        .bd-pos { color: #00ff9f; font-weight: 700; }
        .bd-neg { color: #ff4d6d; font-weight: 700; }

        @media (max-width: 767px) {
            .stats-page { padding: 100px 0 40px; }
            .stats-page-header h1 { font-size: 30px; }
            .summary-cards { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .summary-card { padding: 16px 12px; }
            .summary-card .s-value { font-size: 22px; }
            .month-header { padding: 16px 16px; flex-wrap: wrap; gap: 10px; }
            .month-meta { gap: 12px; flex-wrap: wrap; }
            .bets-table-wrap { padding: 0 12px 16px; }
            .bets-table thead { display: none; }
            .bets-table tbody tr { display: block; padding: 12px 0; }
            .bets-table td { display: block; padding: 3px 0; }
            .bet-unit { text-align: left; }
            .breakdown-section { grid-template-columns: 1fr; }
            .filter-label { min-width: 60px; font-size: 10px; }

        }
    </style>
</head>

    // ============================================================

    let currentTab = 'vip';
    let filters = { result: 'all', stake: 'all', odds: 'all', type: 'all' };
    let filterPanelOpen = false;

    function switchTab(tab) {
        currentTab = tab;
        filters = { result: 'all', stake: 'all', odds: 'all', type: 'all' };
        document.querySelectorAll('.tab-btn').forEach((btn, i) => {
            btn.classList.toggle('active', (i === 0 && tab === 'vip') || (i === 1 && tab === 'free'));
        });
        render();
    }

    function setFilter(key, val) {
        filters[key] = val;
        render();
    }

    function resetFilters() {
        filters = { result: 'all', stake: 'all', odds: 'all', type: 'all' };
        render();
    }

    function toggleFilterPanel() {
        filterPanelOpen = !filterPanelOpen;
        document.getElementById('filterPanel').classList.toggle('open', filterPanelOpen);
        document.getElementById('filterToggleBtn').classList.toggle('open', filterPanelOpen);
    }

    function formatMonth(yyyymm) {
        const months = ['Január','Február','Március','Április','Május','Június',
                        'Július','Augusztus','Szeptember','Október','November','December'];
        const [y, m] = yyyymm.split('-');
        return `${months[parseInt(m) - 1]} ${y}`;
    }

    function getResult(unit) {
        if (unit > 0) return 'win';
        if (unit < 0) return 'loss';
        return 'push';
    }

    function getBetType(pick) {
        const p = pick.toLowerCase();
        if (p.includes('győztese')) return 'winner';
        if (p.includes('játék') || p.includes('szám')) return 'gamecount';
        if (p.includes('szett')) return 'set';
        if (p.includes('pontos') || p.includes('végeredmény')) return 'exact';
        return 'other';
    }

    function applyFilters(bets) {
        return bets.filter(b => {
            if (filters.result === 'win'  && b.unit <= 0) return false;
            if (filters.result === 'loss' && b.unit >= 0) return false;
            if (filters.result === 'push' && b.unit !== 0) return false;
            if (filters.stake === 'small'  && b.stake > 1.0) return false;
            if (filters.stake === 'medium' && (b.stake < 1.5 || b.stake > 2.0)) return false;
            if (filters.stake === 'big'    && b.stake < 3.0) return false;
            if (filters.odds === 'low'  && (b.odds < 1.40 || b.odds >= 1.70)) return false;
            if (filters.odds === 'mid'  && (b.odds < 1.70 || b.odds >= 2.00)) return false;
            if (filters.odds === 'high' && b.odds < 2.00) return false;
            if (filters.type !== 'all' && getBetType(b.pick) !== filters.type) return false;
            return true;
        });
    }

    function calcStats(bets) {
        const wins   = bets.filter(b => b.unit > 0).length;
        const losses = bets.filter(b => b.unit < 0).length;
        const decided = wins + losses;
        const totalUnits = bets.reduce((s, b) => s + b.unit, 0);
        const totalStake  = bets.reduce((s, b) => s + (b.stake || 0), 0);
        const winRate = decided ? (wins / decided * 100) : 0;
        const roi     = totalStake > 0 ? (totalUnits / totalStake * 100) : 0;
        const avgOdds = bets.length ? bets.reduce((s, b) => s + b.odds, 0) / bets.length : 0;
        const avgStake = bets.length ? totalStake / bets.length : 0;
        return { wins, losses, decided, totalUnits, totalStake, winRate, roi, avgOdds, avgStake };
    }

    function getStreak(allBets) {
        const decided = allBets.filter(b => b.unit !== 0).slice().sort((a,b) => a.date.localeCompare(b.date));
        if (!decided.length) return { count: 0, type: 'none' };
        const lastType = decided[decided.length - 1].unit > 0 ? 'win' : 'loss';
        let count = 1;
        for (let i = decided.length - 2; i >= 0; i--) {
            if ((decided[i].unit > 0 ? 'win' : 'loss') === lastType) count++;
            else break;
        }
        return { count, type: lastType };
    }

    function getBestMonth(allBets) {
        const byMonth = {};
        allBets.forEach(b => {
            const ym = b.date.slice(0, 7);
            if (!byMonth[ym]) byMonth[ym] = 0;
            byMonth[ym] += b.unit;
        });
        let best = null, bestVal = -Infinity;
        Object.entries(byMonth).forEach(([ym, val]) => {
            if (val > bestVal) { bestVal = val; best = ym; }
        });
        return best ? { label: formatMonth(best), val: bestVal } : null;
    }

    function renderSummary(filtered, allBets) {
        const s = calcStats(filtered);
        const streak = getStreak(allBets);
        const bestM = getBestMonth(allBets);
        const summaryEl = document.getElementById('summaryCards');
        summaryEl.innerHTML = `
            <div class="summary-card">

                <div class="s-value neutral">${filtered.length}</div>
            </div>
            <div class="summary-card">
                <div class="s-label">Találati arány</div>
                <div class="s-value ${s.winRate >= 50 ? 'positive' : 'negative'}">${s.winRate.toFixed(1)}%</div>
            </div>
            <div class="summary-card">
                <div class="s-label">Összes egység</div>
                <div class="s-value ${s.totalUnits >= 0 ? 'positive' : 'negative'}">${s.totalUnits >= 0 ? '+' : ''}${s.totalUnits.toFixed(2)}</div>
                <div class="s-sub ${s.totalUnits >= 0 ? 'positive' : 'negative'}">${s.totalUnits >= 0 ? '+' : ''}${Math.round(s.totalUnits * 50000).toLocaleString('hu-HU')} Ft</div>

        const badge = document.getElementById('filterBadge');
        const info  = document.getElementById('filterActiveInfo');
        badge.style.display = activeCount > 0 ? 'flex' : 'none';
        badge.textContent = activeCount;
        info.textContent = activeCount > 0 ? `${activeCount} aktív szűrő` : '';
    }


    function breakdownStats(bets, groupFn, groups) {
        return groups.map(g => {
            const sub = bets.filter(b => groupFn(b) === g.key);
            const s = calcStats(sub);
            return { label: g.label, count: sub.length, winRate: s.winRate, units: s.totalUnits, roi: s.roi };
        });
    }

    function renderBreakdown(filtered) {
        const oddsGroups = [
            { key: 'low',  label: '1.40 – 1.69' },
            { key: 'mid',  label: '1.70 – 1.99' },
            { key: 'high', label: '2.00+' },
        ];
        const stakeGroups = [
            { key: 'small',  label: '≤ 1u' },
            { key: 'medium', label: '1.5 – 2u' },
            { key: 'big',    label: '≥ 3u' },
        ];
        const oddsGroupFn = b => {
            if (b.odds < 1.70) return 'low';
            if (b.odds < 2.00) return 'mid';
            return 'high';
        };
        const stakeGroupFn = b => {
            if (b.stake <= 1.0) return 'small';
            if (b.stake <= 2.0) return 'medium';
            return 'big';
        };

        const tableHTML = (rows) => `
            <table class="breakdown-table">
                <thead><tr><th>Kategória</th><th>Fogadás</th><th>Találat%</th><th>Egység</th><th>ROI</th></tr></thead>
                <tbody>
                    ${rows.map(r => `
                    <tr>
                        <td>${r.label}</td>
                        <td>${r.count}</td>
                        <td>${r.count ? r.winRate.toFixed(1)+'%' : '-'}</td>
                        <td class="${r.units >= 0 ? 'bd-pos' : 'bd-neg'}">${r.count ? (r.units >= 0 ? '+' : '') + r.units.toFixed(2) : '-'}</td>
                        <td class="${r.roi >= 0 ? 'bd-pos' : 'bd-neg'}">${r.count ? (r.roi >= 0 ? '+' : '') + r.roi.toFixed(1)+'%' : '-'}</td>
                    </tr>`).join('')}
                </tbody>
            </table>`;

        const oddsData  = breakdownStats(filtered, oddsGroupFn, oddsGroups);
        const stakeData = breakdownStats(filtered, stakeGroupFn, stakeGroups);

        document.getElementById('breakdownSection').innerHTML = `
            <div class="breakdown-card">
                <div class="breakdown-title">Odds sáv szerint</div>
                ${tableHTML(oddsData)}
            </div>
            <div class="breakdown-card">
                <div class="breakdown-title">Tét méret szerint</div>
                ${tableHTML(stakeData)}
            </div>
        `;
    }

    function render() {
        const allBets  = DATA[currentTab];
        const filtered = applyFilters(allBets);

        // Group filtered by month
        const byMonth = {};
        filtered.forEach(b => {
            const ym = b.date.slice(0, 7);
            if (!byMonth[ym]) byMonth[ym] = [];
            byMonth[ym].push(b);
        });
        const months = Object.keys(byMonth).sort().reverse();

        renderSummary(filtered, allBets);
        renderFilters();
        renderBreakdown(filtered);

        // Monthly accordion
        const monthsEl = document.getElementById('monthlyBlocks');
        if (months.length === 0) {
            monthsEl.innerHTML = `<div class="no-data">Nincs találat a megadott szűrőkkel.</div>`;
            return;
        }

        monthsEl.innerHTML = months.map(ym => {
            const monthBets = byMonth[ym];
            const mWins   = monthBets.filter(b => b.unit > 0).length;
            const mLosses = monthBets.filter(b => b.unit < 0).length;
            const mUnits  = monthBets.reduce((s, b) => s + b.unit, 0);
            const mStake  = monthBets.reduce((s, b) => s + (b.stake||0), 0);
            const mRoi    = mStake > 0 ? (mUnits / mStake * 100) : 0;
            const isPos   = mUnits >= 0;

            const rows = monthBets.slice().reverse().map(b => {
                const res = getResult(b.unit);
                const unitStr  = b.unit > 0 ? `+${b.unit.toFixed(2)} egység` : b.unit < 0 ? `${b.unit.toFixed(2)} egység` : '0 egység';
                const stakeStr = b.stake ? `${b.stake.toFixed(2)} egység` : '-';
                return `
                    <tr>
                        <td class="bet-date">${b.date.slice(5).replace('-', '.')}</td>
                        <td><div class="bet-match">${b.match}</div><div class="bet-pick">${b.pick}</div></td>
                        <td class="bet-odds">@${b.odds.toFixed(2)}</td>
                        <td class="bet-stake">${stakeStr}</td>
                        <td><span class="result-badge ${res}">${res === 'win' ? 'NYERT' : res === 'loss' ? 'VESZÍTETT' : 'VISSZA'}</span></td>
                        <td class="bet-unit ${res}">${unitStr}</td>
                    </tr>`;
            }).join('');

            return `
                <div class="month-block" id="month-${ym}">
                    <div class="month-header" onclick="toggleMonth('month-${ym}')">
                        <div class="month-title">${formatMonth(ym)}</div>
                        <div class="month-meta">
                            <div class="month-stat">${monthBets.length} fogadás</div>
                            <div class="month-stat"><span>${mWins}W</span> / <span>${mLosses}L</span></div>
                            <div class="month-stat">ROI: <span class="${mRoi >= 0 ? '' : ''}" style="color:${mRoi >= 0 ? '#00ff9f' : '#ff4d6d'}">${mRoi >= 0 ? '+' : ''}${mRoi.toFixed(1)}%</span></div>
                            <div class="month-profit ${isPos ? 'pos' : 'neg'}">${isPos ? '+' : ''}${mUnits.toFixed(2)} egység</div>
                        </div>
                        <span class="month-toggle">+</span>
                    </div>
                    <div class="bets-table-wrap">
                        <table class="bets-table">
                            <thead>
                                <tr>
                                    <th>Dátum</th>
                                    <th>Meccs / Tipp</th>
                                    <th>Odds</th>
                                    <th>Tét</th>
                                    <th>Eredmény</th>
                                    <th style="text-align:right">Egység</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>`;
        }).join('');

        if (months.length > 0) {
            document.getElementById(`month-${months[0]}`).classList.add('open');
        }
    }

    function toggleMonth(id) {
        document.getElementById(id).classList.toggle('open');
    }

    render();
    </script>
</body>
</html>
