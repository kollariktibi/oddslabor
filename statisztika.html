<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Statisztikák - Odds Labor</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="apple-touch-icon" href="logo.jpg">

    <style>
        /* ===== STATS PAGE ===== */
        .stats-page {
            min-height: 100vh;
            padding: 120px 0 60px;
        }

        .stats-page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .stats-page-header h1 {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ff9f, #00e4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .stats-page-header p {
            color: #7a8ea6;
            font-size: 16px;
        }

        /* Tab switcher */
        .tab-switcher {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .tab-btn {
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid rgba(0, 255, 163, 0.2);
            background: transparent;
            color: #7a8ea6;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0,255,163,0.15), rgba(0,228,255,0.1));
            border-color: rgba(0, 255, 163, 0.5);
            color: #00ff9f;
        }

        /* Summary cards */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .summary-card {
            background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(10,14,26,0.95));
            border: 1px solid rgba(0, 255, 163, 0.15);
            border-radius: 20px;
            padding: 24px 20px;
            text-align: center;
        }

        .summary-card .s-label {
            font-size: 11px;
            color: #5a6a7e;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .summary-card .s-value {
            font-size: 32px;
            font-weight: 900;
            line-height: 1;
        }

        .summary-card .s-value.positive { color: #00ff9f; }
        .summary-card .s-value.negative { color: #ff4d6d; }
        .summary-card .s-value.neutral {
            background: linear-gradient(135deg, #00ff9f, #00e4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Month accordion */
        .month-block {
            background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(10,14,26,0.95));
            border: 1px solid rgba(0, 255, 163, 0.1);
            border-radius: 20px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .month-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 28px;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .month-header:hover {
            background: rgba(0, 255, 163, 0.04);
        }

        .month-title {
            font-size: 18px;
            font-weight: 700;
            color: #c0c8d4;
        }

        .month-meta {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .month-stat {
            font-size: 13px;
            color: #5a6a7e;
        }

        .month-stat span {
            font-weight: 700;
            color: #a0b5cc;
        }

        .month-profit {
            font-size: 16px;
            font-weight: 800;
            min-width: 100px;
            text-align: right;
        }

        .month-profit.pos { color: #00ff9f; }
        .month-profit.neg { color: #ff4d6d; }

        .month-toggle {
            color: #5a6a7e;
            font-size: 20px;
            transition: transform 0.3s;
            margin-left: 16px;
        }

        .month-block.open .month-toggle {
            transform: rotate(45deg);
        }

        /* Bets table */
        .bets-table-wrap {
            display: none;
            padding: 0 28px 20px;
        }

        .month-block.open .bets-table-wrap {
            display: block;
        }

        .bets-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .bets-table thead th {
            padding: 10px 12px;
            text-align: left;
            color: #5a6a7e;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .bets-table tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
        }

        .bets-table tbody tr:hover {
            background: rgba(0, 255, 163, 0.03);
        }

        .bets-table tbody tr:last-child {
            border-bottom: none;
        }

        .bets-table td {
            padding: 12px 12px;
            color: #c0c8d4;
            vertical-align: middle;
        }

        .bet-date {
            color: #5a6a7e;
            white-space: nowrap;
            font-size: 12px;
        }

        .bet-match {
            font-weight: 600;
        }

        .bet-pick {
            color: #7a8ea6;
            font-size: 12px;
        }

        .bet-odds {
            color: #a0b5cc;
            font-weight: 600;
        }

        .bet-stake {
            color: #7a8ea6;
            white-space: nowrap;
        }

        .bet-unit {
            font-weight: 800;
            text-align: right;
            white-space: nowrap;
        }

        .bet-unit.win { color: #00ff9f; }
        .bet-unit.loss { color: #ff4d6d; }
        .bet-unit.push { color: #7a8ea6; }

        .result-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .result-badge.win {
            background: rgba(0, 255, 163, 0.12);
            color: #00ff9f;
        }

        .result-badge.loss {
            background: rgba(255, 77, 109, 0.12);
            color: #ff4d6d;
        }

        .result-badge.push {
            background: rgba(160, 181, 204, 0.12);
            color: #a0b5cc;
        }

        .no-data {
            text-align: center;
            color: #5a6a7e;
            padding: 40px;
            font-size: 14px;
        }

        @media (max-width: 767px) {
            .stats-page { padding: 100px 0 40px; }
            .stats-page-header h1 { font-size: 30px; }
            .summary-cards { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .summary-card { padding: 16px 12px; }
            .summary-card .s-value { font-size: 24px; }
            .month-header { padding: 16px 16px; flex-wrap: wrap; gap: 10px; }
            .month-meta { gap: 12px; flex-wrap: wrap; }
            .bets-table-wrap { padding: 0 12px 16px; }
            .bets-table thead { display: none; }
            .bets-table tbody tr { display: block; padding: 12px 0; }
            .bets-table td { display: block; padding: 3px 0; }
            .bet-unit { text-align: left; }
        }
    </style>
</head>

    // ============================================================

    let currentTab = 'vip';

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach((btn, i) => {
            btn.classList.toggle('active', (i === 0 && tab === 'vip') || (i === 1 && tab === 'free'));
        });
        render();
    }

    function formatMonth(yyyymm) {
        const months = ['Január','Február','Március','Április','Május','Június',
                        'Július','Augusztus','Szeptember','Október','November','December'];
        const [y, m] = yyyymm.split('-');
        return `${months[parseInt(m) - 1]} ${y}`;
    }

    function getResult(unit) {
        if (unit > 0) return 'win';
        if (unit < 0) return 'loss';
        return 'push';
    }

    function render() {
        const bets = DATA[currentTab];

        // Group by month
        const byMonth = {};
        bets.forEach(b => {
            const ym = b.date.slice(0, 7);
            if (!byMonth[ym]) byMonth[ym] = [];
            byMonth[ym].push(b);
        });

        const months = Object.keys(byMonth).sort().reverse();

        // Summary totals
        const totalBets = bets.length;
        const wins = bets.filter(b => b.unit > 0).length;
        const totalUnits = bets.reduce((s, b) => s + b.unit, 0);
        const winRate = totalBets ? Math.round((wins / totalBets) * 100) : 0;

        // Render summary
        const summaryEl = document.getElementById('summaryCards');
        summaryEl.innerHTML = `
            <div class="summary-card">
                <div class="s-label">Összes fogadás</div>
                <div class="s-value neutral">${totalBets}</div>
            </div>
            <div class="summary-card">
                <div class="s-label">Találati arány</div>
                <div class="s-value ${winRate >= 50 ? 'positive' : 'negative'}">${winRate}%</div>
            </div>
            <div class="summary-card">
                <div class="s-label">Összes egység</div>
                <div class="s-value ${totalUnits >= 0 ? 'positive' : 'negative'}">${totalUnits >= 0 ? '+' : ''}${totalUnits.toFixed(2)} egység</div>
            </div>
            <div class="summary-card">
                <div class="s-label">Hónap</div>
                <div class="s-value neutral">${months.length}</div>
            </div>
        `;

        // Render months
        const monthsEl = document.getElementById('monthlyBlocks');

        if (months.length === 0) {
            monthsEl.innerHTML = `<div class="no-data">Még nincsenek adatok ebben a kategóriában.</div>`;
            return;
        }

        monthsEl.innerHTML = months.map((ym, idx) => {
            const monthBets = byMonth[ym];
            const mWins = monthBets.filter(b => b.unit > 0).length;
            const mLosses = monthBets.filter(b => b.unit < 0).length;
            const mUnits = monthBets.reduce((s, b) => s + b.unit, 0);
            const isPos = mUnits >= 0;

            const rows = monthBets.slice().reverse().map(b => {
                const res = getResult(b.unit);
                const unitStr = b.unit > 0
                    ? `+${b.unit.toFixed(2)} egység`
                    : b.unit < 0
                    ? `${b.unit.toFixed(2)} egység`
                    : '0 egység';
                const stakeStr = b.stake ? `${b.stake.toFixed(2)} egység` : '-';
                return `
                    <tr>
                        <td class="bet-date">${b.date.slice(5).replace('-', '.')}</td>
                        <td><div class="bet-match">${b.match}</div><div class="bet-pick">${b.pick}</div></td>
                        <td class="bet-odds">@${b.odds.toFixed(2)}</td>
                        <td class="bet-stake">${stakeStr}</td>
                        <td><span class="result-badge ${res}">${res === 'win' ? 'NYERT' : res === 'loss' ? 'VESZÍTETT' : 'VISSZA'}</span></td>
                        <td class="bet-unit ${res}">${unitStr}</td>
                    </tr>`;
            }).join('');

            return `
                <div class="month-block" id="month-${ym}">
                    <div class="month-header" onclick="toggleMonth('month-${ym}')">
                        <div class="month-title">${formatMonth(ym)}</div>
                        <div class="month-meta">
                            <div class="month-stat">${monthBets.length} fogadás</div>
                            <div class="month-stat"><span>${mWins}W</span> / <span>${mLosses}L</span></div>
                            <div class="month-profit ${isPos ? 'pos' : 'neg'}">${isPos ? '+' : ''}${mUnits.toFixed(2)} egység</div>
                        </div>
                        <span class="month-toggle">+</span>
                    </div>
                    <div class="bets-table-wrap">
                        <table class="bets-table">
                            <thead>
                                <tr>
                                    <th>Dátum</th>
                                    <th>Meccs / Tipp</th>
                                    <th>Odds</th>
                                    <th>Tét</th>
                                    <th>Eredmény</th>
                                    <th style="text-align:right">Egység</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>`;
        }).join('');

        // Open first month by default
        if (months.length > 0) {
            document.getElementById(`month-${months[0]}`).classList.add('open');
        }
    }

    function toggleMonth(id) {
        document.getElementById(id).classList.toggle('open');
    }

    render();
    </script>
</body>
</html>
